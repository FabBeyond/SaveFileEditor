<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <title>Silksong Save File Editor</title>
</head>
<body>
    <div class="top-bar">
        <div>
            <div class="title">
                <img src="resources/misc/map_and_quill.png" alt="map_and_quill" class="title-icon">
                Save File Editor
            </div>
            <p class="sub-title">Upload and edit your save file to your liking</p>
        </div>
        <div class="top-buttons">
            <button class="top-button" onclick="open_save_file()">
                <p class="font">
                    <i class="fa-solid fa-folder"></i>
                    <span>Open Save File</span>
                </p>
            </button>
            <input type="file" id="fileinput" style="display: none;"/>
            <button class="top-button" onclick="download_save_file()">
                <p class="font">
                    <i class="fa-solid fa-floppy-disk"></i>
                    <span>Save Changes</span>
                </p>
            </button>
        </div>
    </div>
    
    <div class="outer-div">
        <div class="inner-left">
            <div class="resources-container">
                <div class="tab-switcher">
                    <p class="single-title font">Resources</p>
                </div>
                <div class="resources-content">
                    <div class="resources-entry">
                        <div class="resources-title font">
                            <img src="resources/resources/rosaries.png" alt="rosaries" class="resources-title-icon">
                            Rosaries
                        </div>
                        <input type="text" class="font">
                    </div>
                    <div class="resources-entry">
                        <div class="resources-title font">
                            <img src="resources/resources/shell_shards.png" alt="shell_shards" class="resources-title-icon">
                            Shell Shards
                        </div>
                        <input type="text" class="font" onchange="on_shell_shard_change(this.childNodes[1])">
                        <p class="resources-title font shell-shards-cap">/ 500</p>
                    </div>
                    <div class="resources-entry image-showcase masks">
                        <div class="resources-title font">
                            <img src="resources/resources/mask_full.png" alt="resources/mask_full" class="resources-title-icon">
                            Mask Shards
                        </div>
                        <button class="font" onclick="change_masks(-1)">-</button>
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <img src="resources/resources/mask0.png" alt="mask">
                        <button class="font" onclick="change_masks(1)">+</button>
                    </div>
                    <div class="resources-entry image-showcase spools">
                        <div class="resources-title font">
                            <img src="resources/resources/spool_fragment.png" alt="spool_fragment" class="resources-title-icon">
                            Spool Fragments
                        </div>
                        <button class="font" onclick="change_spools(-1)">-</button>
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <img src="resources/resources/spool0.png" alt="spool">
                        <button class="font" onclick="change_spools(1)">+</button>
                    </div>
                </div>
            </div>

            <div class="misc-container">
                <div class="tab-switcher">
                    <div class="tab-underline"></div>
                    <button class="tab-button font tab-button-selected" onclick="switchTab(this, 'misc/items', 'items')">Items</button>
                    <button class="tab-button font" onclick="switchTab(this, 'misc/abilities', 'abilities')">Abilities</button>
                    <button class="tab-button font" onclick="switchTab(this, 'misc/bosses', 'bosses')">Bosses</button>
                    <button class="tab-button font" onclick="switchTab(this)">Wishes</button>
                    <button class="tab-button font" onclick="switchTab(this)">Collectables</button>
                    <!-- <button class="tab-button font" onclick="selectResourceTab(this.childNodes[1])">Hunters Journal</button> -->
                </div>
                <div class="misc-container-content">
                    
                </div>
            </div>
        </div>
        <div class="inner-right">
            <div class="resources-container">
                
            </div>

            <div class="misc-container">

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
