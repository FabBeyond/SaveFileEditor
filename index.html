<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <title>Silksong Save File Editor</title>
</head>
<body>
    <div class="top-bar">
        <div>
            <div class="title">
                <img src="resources/map_and_quill.png" alt="map_and_quill" class="title-icon">
                Save File Editor
            </div>
            <p class="sub-title">Upload and edit your save file to your liking</p>
        </div>
        <div class="top-buttons">
            <button class="top-button" onclick="openSaveFile()">
                <p class="font">
                    <i class="fa-solid fa-folder"></i>
                    <span>Open Save File</span>
                </p>
            </button>
            <input type="file" id="fileinput" style="display: none;"/>
            <button class="top-button">
                <p class="font">
                    <i class="fa-solid fa-floppy-disk"></i>
                    <span>Save Changes</span>
                </p>
            </button>
        </div>
    </div>
    
    <div class="outer-div">
        <div class="inner-left">
            <div class="resources-container">
                <div class="tab-switcher">
                    <div class="tab-underline"></div>
                    <button class="tab-button font tab-button-selected" onclick="selectResourceTab(this)">Resources</button>
                    <button class="tab-button font" onclick="selectResourceTab(this)">Items</button>
                    <button class="tab-button font" onclick="selectResourceTab(this)">Abilities</button>
                    <button class="tab-button font" onclick="selectResourceTab(this)">Bosses</button>
                    <button class="tab-button font" onclick="selectResourceTab(this)">Wishes</button>
                </div>
                <div class="resources-content">

                </div>
            </div>

            <div class="misc-container">

            </div>
        </div>
        <div class="inner-right">
            <div class="resources-container">
                
            </div>

            <div class="misc-container">

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
